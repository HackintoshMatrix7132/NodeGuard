name: NodeGuard Agent Release

on:
  push:
    tags:
      - "agent-v*"
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/agent-release.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Agent version without the v prefix"
        required: true
        default: "0.3.1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: agent/go.mod

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/agent-v* ]]; then
            version="${GITHUB_REF_NAME#agent-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            version="0.3.1-ci"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid agent version: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate shell scripts
        run: shellcheck install.sh install-agent.sh tests/install-agent_test.sh

      - name: Validate and test Agent
        run: make fmt-check vet test installer-test

      - name: Build release assets
        run: make VERSION="${{ steps.version.outputs.version }}" COMMIT="${GITHUB_SHA::12}" DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nodeguard-agent-${{ steps.version.outputs.version }}
          path: |
            agent/bin/nodeguard-agent-linux-amd64
            agent/bin/nodeguard-agent-linux-arm64
            agent/bin/checksums.txt
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/agent-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            bin/nodeguard-agent-linux-amd64 \
            bin/nodeguard-agent-linux-arm64 \
            bin/checksums.txt \
            --repo "$GITHUB_REPOSITORY" \
            --title "NodeGuard Agent v${{ steps.version.outputs.version }}" \
            --generate-notes
