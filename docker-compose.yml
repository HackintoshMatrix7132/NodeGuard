services:
  nodeguard:
    build:
      context: .
      args:
        AGENT_VERSION: ${AGENT_RELEASE_VERSION:-0.3.1}
        VITE_NODEGUARD_SUPPORT_URL: ${VITE_NODEGUARD_SUPPORT_URL:-}
    container_name: nodeguard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/nodeguard.sqlite
      WEB_DIST_DIR: apps/web/dist
      AGENT_INSTALLER_PATH: agent/install-agent.sh
      AGENT_RELEASE_DIR: agent-releases
      AGENT_RELEASE_VERSION: ${AGENT_RELEASE_VERSION:-0.3.1}
      TRUST_PROXY: "1"
      NODEGUARD_ADMIN_USERNAME: ${NODEGUARD_ADMIN_USERNAME:-admin}
      NODEGUARD_ADMIN_PASSWORD: ${NODEGUARD_ADMIN_PASSWORD:?Set NODEGUARD_ADMIN_PASSWORD in the root .env file}
      NODEGUARD_DEMO_USERNAME: ${NODEGUARD_DEMO_USERNAME:-demo}
      NODEGUARD_DEMO_PASSWORD: ${NODEGUARD_DEMO_PASSWORD:?Set NODEGUARD_DEMO_PASSWORD in the root .env file}
      NODEGUARD_INTEGRATION_SECRET: ${NODEGUARD_INTEGRATION_SECRET:?Set NODEGUARD_INTEGRATION_SECRET in the root .env file}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-auto}
      REQUEST_JSON_LIMIT: ${REQUEST_JSON_LIMIT:-512kb}
    ports:
      - "3000:3000"
    volumes:
      - nodeguard-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  nodeguard-data:
