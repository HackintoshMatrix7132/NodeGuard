services:
  nodeguard:
    build: .
    container_name: nodeguard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/nodeguard.sqlite
      WEB_DIST_DIR: apps/web/dist
      TRUST_PROXY: "true"
    ports:
      - "3000:3000"
    volumes:
      - nodeguard-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  nodeguard-data:
